jdk:
  - openjdk17

before_install:
  - sdk install java 17.0.10-tem
  - sdk use java 17.0.10-tem

install:
  - ./gradlew
      :dbflow-core:publishToMavenLocal
      :dbflow:publishToMavenLocal
      :dbflow-processor:publishToMavenLocal
      :dbflow-kotlinextensions:publishToMavenLocal
      :dbflow-rx:publishToMavenLocal
      :dbflow-rx-kotlinextensions:publishToMavenLocal
      :dbflow-rx2:publishToMavenLocal
      :dbflow-rx2-kotlinextensions:publishToMavenLocal
      :dbflow-sqlcipher:publishToMavenLocal
      -x test
      -x lint
      --no-daemon
